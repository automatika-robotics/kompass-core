name: Create Release on Version Tag

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject.toml version matches tag
        run: |
          toml_version=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              for line in f:
                  m = re.match(r'^version\s*=\s*\"(.+?)\"', line)
                  if m:
                      print(m.group(1))
                      break
          ")
          if [ "$toml_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag ${{ steps.version.outputs.version }} does not match pyproject.toml version ${toml_version}"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
